<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Подписчики - Social AI Network</title>
    <link rel="stylesheet" href="/css/main.css">
</head>
<body>
<div class="header">
    <div class="container">
        <div class="nav">
            <h2>Social AI Network</h2>
            <div class="nav-links">
                <a href="/profile">🏠 Лента</a>
                <a href="/my-posts">📝 Мои посты</a>
                <a href="/daily">🤖 Вопрос дня</a>
                <a href="/search">🔍 Найти друзей</a>
            </div>
            <button class="logout-btn" onclick="logout()">Выйти</button>
        </div>
    </div>
</div>

<div class="container main-layout">
    <div class="sidebar">
        <div class="profile-card">
            <div class="avatar-container">
                <div class="avatar" onclick="goToMyProfile()">
                    <span id="sidebarAvatarText">👤</span>
                    <img id="sidebarAvatarImage" style="display: none;">
                </div>
            </div>
            <h3 class="profile-name" id="sidebarName">Загрузка...</h3>
            <div class="profile-username" id="sidebarUsername">@username</div>
            <div class="stats">
                <div class="stat-item" onclick="showFollowers()">
                    <div class="stat-number" id="sidebarFollowers">0</div>
                    <div class="stat-label">подписчиков</div>
                </div>
                <div class="stat-item" onclick="showFollowing()">
                    <div class="stat-number" id="sidebarFollowing">0</div>
                    <div class="stat-label">подписок</div>
                </div>
            </div>
            <div class="profile-info">
                <div class="info-item">
                    <div class="info-label">📝 О себе</div>
                    <div class="info-value" id="sidebarBio">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">🎯 Интересы</div>
                    <div class="info-value" id="sidebarInterests">-</div>
                </div>
                <div class="info-item">
                    <div class="info-label">💼 Деятельность</div>
                    <div class="info-value" id="sidebarActivity">-</div>
                </div>
            </div>
        </div>
    </div>

    <div class="content-area">
        <!--        <button class="back-btn" onclick="history.back()">← Назад</button>-->
        <h2 style="margin: 20px 0;">👥 Подписчики</h2>
        <div id="followersList">
            <div class="loading">
                <div class="spinner"></div>
                <p>Загрузка...</p>
            </div>
        </div>
    </div>
</div>

<script src="/js/common.js"></script>
<script src="/js/followers.js"></script>
</body>
</html>
