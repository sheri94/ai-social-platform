<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Социальная сеть с ИИ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .form-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #667eea;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3c3;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="form-card">
        <h1>Добро пожаловать!</h1>
        <div class="subtitle">Заполните анкету для ИИ-ассистента</div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <form id="registerForm">
            <div class="form-group">
                <label>Логин *</label>
                <input type="text" id="username" required minlength="3">
            </div>

            <div class="form-group">
                <label>Пароль *</label>
                <input type="password" id="password" required minlength="6">
            </div>

            <div class="form-group">
                <label>Полное имя *</label>
                <input type="text" id="fullName" required>
            </div>

            <div class="form-group">
                <label>О себе</label>
                <textarea id="bio" placeholder="Расскажите немного о себе..."></textarea>
            </div>

            <div class="form-group">
                <label>Интересы</label>
                <textarea id="interests" placeholder="Программирование, спорт, музыка, путешествия..."></textarea>
            </div>

            <div class="form-group">
                <label>Деятельность / Работа</label>
                <textarea id="activity" placeholder="Чем вы занимаетесь?"></textarea>
            </div>

            <button type="submit">Зарегистрироваться</button>
        </form>

        <div class="login-link">
            Уже есть аккаунт? <a href="login.html">Войти</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();

        const formData = {
            username: document.getElementById('username').value,
            password: document.getElementById('password').value,
            fullName: document.getElementById('fullName').value,
            bio: document.getElementById('bio').value,
            interests: document.getElementById('interests').value,
            activity: document.getElementById('activity').value
        };

        try {
            const response = await fetch('http://localhost:8080/api/v1/auth/register', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify(formData)
            });

            if (response.ok) {
                const user = await response.json();
                document.getElementById('successMessage').style.display = 'block';
                document.getElementById('successMessage').innerHTML = 'Регистрация успешна! Перенаправление на страницу входа...';
                document.getElementById('errorMessage').style.display = 'none';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 2000);
            } else {
                const error = await response.json();
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('errorMessage').innerHTML = error.error || 'Ошибка регистрации';
                document.getElementById('successMessage').style.display = 'none';
            }
        } catch (error) {
            document.getElementById('errorMessage').style.display = 'block';
            document.getElementById('errorMessage').innerHTML = 'Ошибка соединения с сервером';
            document.getElementById('successMessage').style.display = 'none';
        }
    });
</script>
</body>
</html>
